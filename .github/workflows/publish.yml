name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build and pack
        run: |
          cd src
          dotnet pack BeneficialStrategies.Iso20022.Common \
            -c Release \
            --output ./nupkg

      - name: Push to NuGet
        run: |
          dotnet nuget push src/nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
